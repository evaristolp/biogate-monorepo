name: BioGate CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r scripts/requirements.txt
      - name: Check API import
        run: |
          python -c "from backend.main import app; print('API Loaded')"
      - name: Run tests
        run: |
          pytest